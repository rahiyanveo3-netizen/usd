<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENZ TOP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background: radial-gradient(circle at top, #1a1a40, #0b0b1f 60%, #050510);
}

/* CARD */
.download-card{
    width:100%;
    max-width:520px;
    padding:45px 35px;
    text-align:center;
    border-radius:30px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(25px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    position:relative;
    overflow:hidden;
}

/* glow effect */
.download-card::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,107,53,0.15), transparent 60%);
    animation: rotateGlow 8s linear infinite;
}

@keyframes rotateGlow{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* LOGO */
.app-icon{
    width:110px;
    height:110px;
    margin:0 auto 20px;
    border-radius:28px;
    overflow:hidden;
    box-shadow: 0 15px 35px rgba(255,107,53,0.35);
    transform: translateZ(0);
    transition:0.3s;
    position:relative;
    z-index:2;
}

.app-icon:hover{
    transform:scale(1.08);
}

.app-icon img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TITLE */
h1{
    color:#fff;
    font-size:34px;
    margin-bottom:8px;
    letter-spacing:1px;
    position:relative;
    z-index:2;
}

.tagline{
    color:rgba(255,255,255,0.75);
    font-size:15px;
    margin-bottom:25px;
    position:relative;
    z-index:2;
}

/* VERSION */
.version-info{
    display:inline-block;
    padding:10px 18px;
    border-radius:50px;
    background:rgba(255,255,255,0.08);
    color:#ddd;
    font-size:13px;
    margin-bottom:25px;
    position:relative;
    z-index:2;
}

.version-info span{
    color:#ffb347;
    font-weight:bold;
}

/* FEATURES */
.features{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:30px;
    position:relative;
    z-index:2;
}

.feature-item{
    padding:8px 14px;
    border-radius:20px;
    background:rgba(255,255,255,0.06);
    color:rgba(255,255,255,0.8);
    font-size:13px;
    border:1px solid rgba(255,255,255,0.08);
}

/* BUTTON */
.download-btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    width:100%;
    max-width:340px;
    padding:16px 20px;
    font-size:18px;
    font-weight:700;
    color:#fff;
    text-decoration:none;
    border-radius:60px;
    background: linear-gradient(135deg,#ff6b35,#ff3d77,#ffb347);
    background-size:200% 200%;
    animation: gradientMove 4s ease infinite;
    box-shadow: 0 10px 30px rgba(255,70,100,0.35);
    overflow:hidden;
    z-index:2;
    transition:0.3s;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* shine effect */
.download-btn::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background: linear-gradient(120deg,transparent,rgba(255,255,255,0.35),transparent);
    transition:0.5s;
}

.download-btn:hover::after{
    left:100%;
}

.download-btn:hover{
    transform:scale(1.05);
    box-shadow:0 15px 45px rgba(255,70,100,0.55);
}

.download-btn svg{
    width:22px;
    height:22px;
    fill:#fff;
}

/* BOTTOM TEXT */
.secure-badge{
    margin-top:18px;
    font-size:12px;
    color:rgba(255,255,255,0.4);
    position:relative;
    z-index:2;
}
</style>
</head>

<body>

<div class="download-card">

    <div class="app-icon">
        <img src="/logo.png" alt="XM1 SHOP">
    </div>

    <h1>ZENZ TOP</h1>

    <p class="tagline">
        সবকিছু এক জায়গায় — দ্রুত, নিরাপদ ও আধুনিক অভিজ্ঞতা
    </p>

    <div class="version-info">
        📦 সংস্করণ <span>v2.4.1</span> · Updated 2026
    </div>

    <div class="features">
        <div class="feature-item">✔ Fast</div>
        <div class="feature-item">✔ Secure</div>
        <div class="feature-item">✔ Lightweight</div>
    </div>

    <a href="/zenztop.apk" download class="download-btn">
        <svg viewBox="0 0 24 24">
            <path d="M5 20h14v-2H5v2zM12 16l-5-5h3V4h4v7h3l-5 5z"/>
        </svg>
        ডাউনলোড করুন
    </a>

    <div class="secure-badge">
        🔒 SSL এনক্রিপ্টেড · নিরাপদ ডাউনলোড নিশ্চিত
    </div>

</div>

</body>
</html>
